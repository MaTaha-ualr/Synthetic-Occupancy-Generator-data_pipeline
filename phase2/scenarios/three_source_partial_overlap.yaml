scenario_id: three_source_partial_overlap
seed: 20260415
phase1:
  data_path: phase1/outputs_phase1/Phase1_people_addresses.csv
  manifest_path: phase1/outputs_phase1/Phase1_people_addresses.manifest.json
parameters:
  move_rate_pct: 9.0
simulation:
  granularity: monthly
  start_date: 2026-01-01
  periods: 12
emission:
  crossfile_match_mode: one_to_one
  overlap_entity_pct: 42.0
  datasets:
    - dataset_id: registry
      filename: observed_registry.csv
      snapshot: simulation_start
      appearance_pct: 96.0
      duplication_pct: 1.0
      noise:
        middle_name_missing_pct: 8.0
    - dataset_id: claims
      filename: observed_claims.csv
      snapshot: simulation_end
      appearance_pct: 74.0
      duplication_pct: 5.0
      noise:
        middle_name_missing_pct: 18.0
        name_typo_pct: 1.5
    - dataset_id: benefits
      filename: observed_benefits.csv
      snapshot: simulation_end
      appearance_pct: 52.0
      duplication_pct: 3.0
      noise:
        middle_name_missing_pct: 16.0
        name_typo_pct: 1.0
        phone_mask_pct: 1.0
quality:
  household_size_range:
    min: 1
    max: 8
selection:
  sample:
    mode: pct
    value: 100.0
  filters:
    age_bins: []
    genders: []
    ethnicities: []
    residence_types: []
    redundancy_profiles: []
    mobility_propensity_buckets: []
  thresholds:
    mobility_low_max: 0.09
    mobility_high_min: 0.18
    trait_low_max: 0.33
    trait_high_min: 0.66
constraints:
  min_marriage_age: 18
  max_partner_age_gap: 25
  fertility_age_range:
    min: 15
    max: 49
  allow_underage_marriage: false
  allow_child_lives_alone: false
  enforce_non_overlapping_residence_intervals: true
