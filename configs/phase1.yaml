phase1:
  n_people: 10000
  n_entities: 10000
  n_records: 14000
  seed: 20260303

  output:
    format: csv
    path: outputs/Phase1_people_addresses.csv
    chunk_size: 50000

  name_duplication:
    exact_full_name_people_pct: 58.0
    collision_group_min_size: 3
    collision_group_max_size: 7

  redundancy:
    enabled: true
    min_records_per_entity: 1
    max_records_per_entity: 4
    shape: balanced
    heavy_tail_alpha: 1.3

  nicknames:
    enabled: true
    source_dir: Names/nick names
    mode: per_record
    usage_pct: 35.0

  distributions:
    gender:
      female: 50.5
      male: 49.5
    ethnicity: null
    unisex_weight_multiplier: 0.35

  age_bins:
    enabled_bins_only: true
    auto_normalize: true
    pct_interpretation: absolute
    bins:
      - id: age_0_17
        label: 0-17 (Children)
        min_age: 0
        max_age: 17
        pct: 21.8
        enabled: true
      - id: age_18_34
        label: 18-34 (Young Adults)
        min_age: 18
        max_age: 34
        pct: 22.4
        enabled: true
      - id: age_35_64
        label: 35-64 (Adults)
        min_age: 35
        max_age: 64
        pct: 38.1
        enabled: true
      - id: age_65_plus
        label: 65+ (Seniors)
        min_age: 65
        max_age: 95
        pct: 17.7
        enabled: true

  address:
    houses_pct: 70
    apartments_pct: 30
    house_number_min: 100
    house_number_max: 99999

    apartment:
      units_per_building: 60
      unit_type_distribution:
        APT: 70
        UNIT: 20
        STE: 10
      unit_format_distribution:
        numeric_3digit: 55
        floor_letter: 30
        wing_numeric: 15

    mailing:
      style: ohc_po_box
      house_po_box_pct: 42
      apartment_po_box_pct: 44
      apartment_shared_po_box_pct: 100
      po_box_zip_keep_pct: 17
      po_box_zip_shift_min: 1
      po_box_zip_shift_max: 799
      po_box_number_digits:
        d3: 10
        d4: 42
        d5: 48
      po_box_route_digits:
        d3: 15
        d4: 35
        d5: 25
        d6: 25

  fill_rates:
    middle_name: 0.65
    suffix: 0.33
    phone: 0.98

  suffix_distribution:
    Jr: 65
    Sr: 20
    III: 15
    I: 34

  residence_dates:
    start_year_min: 1995
    open_ended_pct: 84
    min_duration_days: 90

  quality:
    distribution_tolerance_pct: 1.5
    exact_uniqueness_check_max_rows: 250000
